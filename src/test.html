<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 深渊召唤 - 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a1a;
            color: #00ff00;
            height: 100vh;
            overflow: hidden;
        }
        
        .test-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 60px 1fr 200px;
            gap: 10px;
            height: 100vh;
            padding: 10px;
        }
        
        /* 头部 */
        .test-header {
            grid-column: 1 / -1;
            background: linear-gradient(90deg, #1a1a2e, #16213e);
            border: 2px solid #00ff00;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .test-header h1 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .test-version {
            background: #00ff00;
            color: #000;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }
        
        /* 游戏区域 */
        .game-area {
            background: #1a1a2e;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* 调试面板 */
        .debug-panel {
            background: #0d1117;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-header {
            background: #161b22;
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .debug-section {
            margin-bottom: 20px;
        }
        
        .debug-section h3 {
            color: #58a6ff;
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #30363d;
        }
        
        .debug-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
            font-size: 13px;
        }
        
        .debug-label {
            color: #8b949e;
        }
        
        .debug-value {
            color: #7ee787;
            font-weight: bold;
        }
        
        .debug-value.warning {
            color: #ffa657;
        }
        
        .debug-value.danger {
            color: #f85149;
        }
        
        /* 测试工具 */
        .test-tools {
            background: #0d1117;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 12px;
        }
        
        .tool-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            text-align: left;
        }
        
        .tool-btn:hover {
            background: #30363d;
            border-color: #58a6ff;
        }
        
        .tool-btn.danger {
            border-color: #f85149;
        }
        
        .tool-btn.danger:hover {
            background: #f85149;
            color: #fff;
        }
        
        .tool-btn.success {
            border-color: #238636;
        }
        
        .tool-btn.success:hover {
            background: #238636;
            color: #fff;
        }
        
        /* 日志区域 */
        .log-area {
            grid-column: 1 / -1;
            background: #0d1117;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .log-toolbar {
            background: #161b22;
            padding: 8px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #161b22;
        }
        
        .log-entry.error {
            color: #f85149;
        }
        
        .log-entry.warn {
            color: #ffa657;
        }
        
        .log-entry.info {
            color: #58a6ff;
        }
        
        .log-entry.success {
            color: #7ee787;
        }
        
        .log-time {
            color: #6e7681;
            margin-right: 8px;
        }
        
        /* 快捷键提示 */
        .shortcuts {
            position: fixed;
            bottom: 220px;
            right: 420px;
            background: rgba(0,0,0,0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            display: none;
        }
        
        .shortcuts.show {
            display: block;
        }
        
        .shortcuts h4 {
            color: #58a6ff;
            margin-bottom: 10px;
        }
        
        .shortcut-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 3px 0;
        }
        
        kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        /* 刷新按钮 */
        .refresh-btn {
            background: #1f6feb;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .refresh-btn:hover {
            background: #388bfd;
        }
        
        .clear-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <!-- 头部 -->
        <div class="test-header">
            <h1>
                🧪 深渊召唤 - 测试页面
                <span class="test-version">v0.2.1</span>
            </h1>
            <div>
                <button class="refresh-btn" onclick="refreshGame()">🔄 刷新游戏</button>
                <button class="refresh-btn" onclick="toggleShortcuts()" style="margin-left: 10px;">⌨️ 快捷键</button>
            </div>
        </div>
        
        <!-- 游戏区域 -->
        <div class="game-area">
            <iframe class="game-iframe" src="index.html" id="gameFrame"></iframe>
        </div>
        
        <!-- 调试面板 -->
        <div class="debug-panel">
            <div class="panel-header">
                🔍 调试面板
            </div>
            <div class="panel-content" id="debugPanel">
                <div class="debug-section">
                    <h3>👤 玩家状态</h3>
                    <div class="debug-row">
                        <span class="debug-label">生命值</span>
                        <span class="debug-value" id="debug-hp">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">理智值</span>
                        <span class="debug-value" id="debug-sanity">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">能量</span>
                        <span class="debug-value" id="debug-energy">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">金币</span>
                        <span class="debug-value" id="debug-gold">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">徽章</span>
                        <span class="debug-value" id="debug-badge">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">疯狂值</span>
                        <span class="debug-value" id="debug-madness">-</span>
                    </div>
                </div>
                
                <div class="debug-section">
                    <h3>⚔️ 战斗状态</h3>
                    <div class="debug-row">
                        <span class="debug-label">当前层数</span>
                        <span class="debug-value" id="debug-floor">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">回合数</span>
                        <span class="debug-value" id="debug-turn">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">敌人数量</span>
                        <span class="debug-value" id="debug-enemies">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">游戏阶段</span>
                        <span class="debug-value" id="debug-phase">-</span>
                    </div>
                </div>
                
                <div class="debug-section">
                    <h3>🎴 卡组信息</h3>
                    <div class="debug-row">
                        <span class="debug-label">卡组总数</span>
                        <span class="debug-value" id="debug-deck">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">手牌数</span>
                        <span class="debug-value" id="debug-hand">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">抽牌堆</span>
                        <span class="debug-value" id="debug-draw">-</span>
                    </div>
                    <div class="debug-row">
                        <span class="debug-label">弃牌堆</span>
                        <span class="debug-value" id="debug-discard">-</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 测试工具 -->
        <div class="test-tools">
            <div class="panel-header">
                🛠️ 测试工具
            </div>
            <div class="panel-content">
                <div class="tools-grid">
                    <button class="tool-btn success" onclick="addHP()">❤️ +10 HP</button>
                    <button class="tool-btn success" onclick="addSanity()">🧠 +10 理智</button>
                    <button class="tool-btn success" onclick="addEnergy()">⚡ 满能量</button>
                    <button class="tool-btn success" onclick="addGold()">💰 +100 金币</button>
                    <button class="tool-btn" onclick="skipToCombat()">⚔️ 跳过到战斗</button>
                    <button class="tool-btn" onclick="skipToBoss()">👑 直接Boss</button>
                    <button class="tool-btn" onclick="drawCards()">🎴 抽5张卡</button>
                    <button class="tool-btn" onclick="resetCooldowns()">🔄 重置冷却</button>
                    <button class="tool-btn danger" onclick="killAllEnemies()">💀 击杀所有敌人</button>
                    <button class="tool-btn danger" onclick="lowSanity()">🌀 理智归零</button>
                    <button class="tool-btn" onclick="testBadge('深渊使者')">🐙 深渊使者</button>
                    <button class="tool-btn" onclick="testBadge('旧日支配者')">👁️ 旧日支配者</button>
                </div>
            </div>
        </div>
        
        <!-- 日志区域 -->
        <div class="log-area">
            <div class="log-toolbar">
                <span>📋 控制台日志</span>
                <div style="flex: 1;"></div>
                <button class="clear-btn" onclick="clearLogs()">清除</button>
                <label style="display: flex; align-items: center; gap: 5px; font-size: 12px;">
                    <input type="checkbox" id="autoScroll" checked> 自动滚动
                </label>
            </div>
            <div class="log-content" id="logContent">
                <div class="log-entry info">
                    <span class="log-time">[初始化]</span>
                    测试页面已加载，等待游戏初始化...
                </div>
            </div>
        </div>
    </div>
    
    <!-- 快捷键提示 -->
    <div class="shortcuts" id="shortcuts">
        <h4>⌨️ 快捷键</h4>
        <div class="shortcut-row"><span>刷新游戏</span> <kbd>R</kbd></div>
        <div class="shortcut-row"><span>+10 HP</span> <kbd>H</kbd></div>
        <div class="shortcut-row"><span>+10 理智</span> <kbd>S</kbd></div>
        <div class="shortcut-row"><span>满能量</span> <kbd>E</kbd></div>
        <div class="shortcut-row"><span>抽卡</span> <kbd>D</kbd></div>
        <div class="shortcut-row"><span>清日志</span> <kbd>C</kbd></div>
        <div class="shortcut-row"><span>显示/隐藏快捷键</span> <kbd>?</kbd></div>
    </div>

    <script>
        // 日志系统
        function log(message, type = 'info') {
            const logContent = document.getElementById('logContent');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            logContent.appendChild(entry);
            
            if (document.getElementById('autoScroll').checked) {
                logContent.scrollTop = logContent.scrollHeight;
            }
        }
        
        function clearLogs() {
            document.getElementById('logContent').innerHTML = '';
            log('日志已清除', 'info');
        }
        
        // 获取游戏 iframe
        function getGameFrame() {
            return document.getElementById('gameFrame').contentWindow;
        }
        
        // 检查游戏是否加载
        function isGameReady() {
            const frame = getGameFrame();
            return frame && frame.game && frame.game.state;
        }
        
        // 刷新游戏
        function refreshGame() {
            document.getElementById('gameFrame').src = 'index.html';
            log('游戏已刷新', 'info');
        }
        
        // 更新调试面板
        function updateDebugPanel() {
            if (!isGameReady()) {
                return;
            }
            
            const frame = getGameFrame();
            const game = frame.game;
            const player = game.state.player;
            const combat = game.state.combat;
            
            // 玩家状态
            document.getElementById('debug-hp').textContent = `${player.hp}/${player.maxHp}`;
            document.getElementById('debug-sanity').textContent = `${player.sanity}/${player.maxSanity}`;
            document.getElementById('debug-energy').textContent = `${player.energy}/${player.maxEnergy}`;
            document.getElementById('debug-gold').textContent = player.gold;
            document.getElementById('debug-badge').textContent = player.badge || '无';
            
            const madness = combat ? (combat.madness || 0) : 0;
            document.getElementById('debug-madness').textContent = madness;
            
            // 战斗状态
            document.getElementById('debug-floor').textContent = game.state.floor;
            document.getElementById('debug-turn').textContent = combat ? combat.turn : '-';
            document.getElementById('debug-enemies').textContent = combat ? combat.enemies.filter(e => e.hp > 0).length : '-';
            document.getElementById('debug-phase').textContent = game.state.phase;
            
            // 卡组信息
            document.getElementById('debug-deck').textContent = player.deck.length;
            document.getElementById('debug-hand').textContent = player.hand.length;
            document.getElementById('debug-draw').textContent = player.drawPile.length;
            document.getElementById('debug-discard').textContent = player.discardPile.length;
        }
        
        // 测试工具函数
        function addHP() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const player = getGameFrame().game.state.player;
            player.hp = Math.min(player.hp + 10, player.maxHp);
            getGameFrame().game.renderSystem.updateCombatUI();
            log('已添加 10 HP', 'success');
            updateDebugPanel();
        }
        
        function addSanity() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const player = getGameFrame().game.state.player;
            player.sanity = Math.min(player.sanity + 10, player.maxSanity);
            getGameFrame().game.updateSanityState();
            getGameFrame().game.renderSystem.updateCombatUI();
            log('已添加 10 理智值', 'success');
            updateDebugPanel();
        }
        
        function addEnergy() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const player = getGameFrame().game.state.player;
            player.energy = player.maxEnergy;
            getGameFrame().game.renderSystem.updateCombatUI();
            log('能量已回满', 'success');
            updateDebugPanel();
        }
        
        function addGold() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const player = getGameFrame().game.state.player;
            player.gold += 100;
            getGameFrame().game.renderSystem.updateCombatUI();
            log('已添加 100 金币', 'success');
            updateDebugPanel();
        }
        
        function drawCards() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const game = getGameFrame().game;
            if (game.combatSystem) {
                game.combatSystem.drawCards(5);
                game.renderSystem.updateCombatUI();
                log('已抽取 5 张卡牌', 'success');
                updateDebugPanel();
            }
        }
        
        function killAllEnemies() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const combat = getGameFrame().game.state.combat;
            if (combat && combat.enemies) {
                combat.enemies.forEach(e => { e.hp = 0; });
                getGameFrame().game.renderSystem.renderGrid();
                log('所有敌人已被击杀', 'success');
                updateDebugPanel();
            }
        }
        
        function lowSanity() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const player = getGameFrame().game.state.player;
            player.sanity = 0;
            getGameFrame().game.updateSanityState();
            getGameFrame().game.renderSystem.updateCombatUI();
            log('理智值已归零 - 进入疯狂状态！', 'warn');
            updateDebugPanel();
        }
        
        function testBadge(badgeName) {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const game = getGameFrame().game;
            // 重新开始游戏并选择指定徽章
            game.initPlayer();
            game.state.floor = 1;
            game.state.gold = 0;
            game.giveStartingDeck();
            
            // 应用徽章
            if (frame.BadgeManager) {
                frame.BadgeManager.applyBadge(game.state.player, badgeName);
            }
            
            game.state.player.drawPile = frame.Utils.shuffle(game.state.player.deck.slice());
            game.startFloor(1);
            game.showScreen('map');
            
            log(`已切换到 ${badgeName} 徽章`, 'success');
            updateDebugPanel();
        }
        
        function skipToCombat() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const game = getGameFrame().game;
            game.startCombat('combat');
            log('已跳转到普通战斗', 'info');
            updateDebugPanel();
        }
        
        function skipToBoss() {
            if (!isGameReady()) {
                log('游戏尚未加载', 'error');
                return;
            }
            const game = getGameFrame().game;
            game.startCombat('boss');
            log('已跳转到 Boss 战', 'info');
            updateDebugPanel();
        }
        
        function resetCooldowns() {
            log('重置冷却功能待实现', 'warn');
        }
        
        // 快捷键
        function toggleShortcuts() {
            const el = document.getElementById('shortcuts');
            el.classList.toggle('show');
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.key.toLowerCase()) {
                case 'r': refreshGame(); break;
                case 'h': addHP(); break;
                case 's': addSanity(); break;
                case 'e': addEnergy(); break;
                case 'd': drawCards(); break;
                case 'c': clearLogs(); break;
                case '?': toggleShortcuts(); break;
            }
        });
        
        // 定时更新调试面板
        setInterval(updateDebugPanel, 500);
        
        // 初始日志
        log('测试页面就绪', 'success');
        log('快捷键: R=刷新 H=+HP S=+理智 E=能量 D=抽卡 C=清日志 ?=帮助', 'info');
    </script>
</body>
</html>
